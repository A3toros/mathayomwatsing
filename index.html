<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Testing System - Personal Cabinet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏫 School Testing System</h1>
            <p>Access your Personal Cabinet to view tests, scores, and progress</p>
        </header>

        <!-- Login Section -->
        <section id="loginSection" class="login-section">
            <h2>🔐 Student Login</h2>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username (Nickname):</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your nickname">
                </div>
                <div class="form-group">
                    <label for="password">Password (Student ID):</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your Student ID">
                </div>
                <button type="submit" class="login-btn">Login to Personal Cabinet</button>
            </form>
            <div id="loginStatus" class="login-status"></div>
        </section>

        <!-- User Dropdown Button (Hidden until login) -->
        <div id="userDropdownContainer" class="user-dropdown-container" style="display: none;">
            <button id="userDropdownBtn" class="user-dropdown-btn" onclick="toggleDropdown()">
                👤 Personal Menu
            </button>
            <div id="userDropdownMenu" class="user-dropdown-menu">
                <a href="#" onclick="showPersonalCabinet()">📚 Personal Cabinet</a>
                <a href="#" onclick="logout()">🚪 Log Out</a>
            </div>
        </div>

        <!-- Personal Cabinet Section (Hidden until login) -->
        <section id="personalCabinetSection" class="personal-cabinet" style="display: none;">
            <!-- Personal Cabinet content will be dynamically generated -->
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
