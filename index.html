<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathayom Watsing Testing System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Welcome to Mathayom Watsing Testing Website</h1>
        </header>

        <!-- Login Section -->
        <section id="login-section" class="login-section">
            <h2>Student Login</h2>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username (Nickname):</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your nickname">
                </div>
                <div class="form-group">
                    <label for="password">Password (Student ID):</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your Student ID">
                </div>
                <button type="submit" class="login-btn">Login to Personal Cabinet</button>
            </form>
            <div id="login-status" class="login-status"></div>
        </section>

        <!-- Welcome Section (Hidden until login) -->
        <section id="welcome-section" class="welcome-section" style="display: none;">
            <p class="welcome-message">Access your Personal Cabinet to view available tests and your progress.</p>
        </section>

        <!-- User Dropdown Button (Hidden until login) -->
        <div id="user-dropdown" class="user-dropdown-container" style="display: none;">
            <button id="userDropdownBtn" class="user-dropdown-btn" onclick="toggleDropdown()">
                Personal Menu
            </button>
            <div id="user-dropdown-menu" class="user-dropdown-menu">
                <a href="#" onclick="showPersonalCabinet()">Personal Cabinet</a>
                <a href="#" onclick="logout()">Log Out</a>
            </div>
        </div>

        <!-- Personal Cabinet Section (Hidden until login) -->
        <section id="personalCabinetSection" class="personal-cabinet" style="display: none;">
            <!-- Personal Cabinet content will be dynamically generated -->
        </section>

        <!-- Questionnaire Section (Hidden until login) -->
        <section id="questionnaire-section" style="display: none;">
            <form id="questionnaire-form">
                <!-- Optional: inputs question1..question10 could be added by specific test pages -->
            </form>
            <div id="questionnaire-status" class="status"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
