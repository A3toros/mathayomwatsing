<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Test M3 - Grade 3</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body class="test-gradient">
    <div class="container">
        <h1>📚 Vocabulary Test M3</h1>
        
        <div class="test-info">
            <h3>Grade 3 - Vocabulary Test</h3>
            <p><strong>Instructions:</strong> Fill in the correct word for each prompt. Each word should be appropriate for 3rd grade level.</p>
            <p><strong>Time Limit:</strong> 30 minutes | <strong>Questions:</strong> 10</p>
        </div>

        <form id="vocabularyTestForm">
            <div class="word-pair">
                <span class="word-label">Word 1:</span>
                <input type="text" class="word-input" name="word1" placeholder="Enter word" required>
            </div>

            <div class="word-pair">
                <span class="word-label">Word 2:</span>
                <input type="text" class="word-input" name="word2" placeholder="Enter word" required>
            </div>

            <div class="word-pair">
                <span class="word-label">Word 3:</span>
                <input type="text" class="word-input" name="word3" placeholder="Enter word" required>
            </div>

            <div class="word-pair">
                <span class="word-label">Word 4:</span>
                <input type="text" class="word-input" name="word4" placeholder="Enter word" required>
            </div>

            <div class="word-pair">
                <span class="word-label">Word 5:</span>
                <input type="text" class="word-input" name="word5" placeholder="Enter word" required>
            </div>

            <div class="word-pair">
                <span class="word-label">Word 6:</span>
                <input type="text" class="word-input" name="word6" placeholder="Enter word" required>
            </div>

            <div class="word-pair">
                <span class="word-label">Word 7:</span>
                <input type="text" class="word-input" name="word7" placeholder="Enter word" required>
            </div>

            <div class="word-pair">
                <span class="word-label">Word 8:</span>
                <input type="text" class="word-input" name="word8" placeholder="Enter word" required>
            </div>

            <div class="word-pair">
                <span class="word-label">Word 9:</span>
                <input type="text" class="word-input" name="word9" placeholder="Enter word" required>
            </div>

            <div class="word-pair">
                <span class="word-label">Word 10:</span>
                <input type="text" class="word-input" name="word10" placeholder="Enter word" required>
            </div>

            <button type="submit" class="submit-btn">Submit Test</button>
        </form>
    </div>

    
</body>
</html>
